name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # fetch-depth: 0 gives goreleaser the full git history it needs for changelog generation.
      # pinned to current major as of 2026-04-24
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # go-version-file reads the version from go.mod so this workflow stays in sync
      # without manual updates.
      # pinned to current major as of 2026-04-24
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # args: release --clean replaces the old --rm-dist flag.
      # HOMEBREW_TAP_GITHUB_TOKEN is the PAT scoped to homebrew-skillhub and scoop-skillhub
      # with contents:write. It is referenced inside .goreleaser.yaml as
      # {{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }} in both homebrew_casks and scoops repository blocks.
      # pinned to current major as of 2026-04-24
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
