version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jaimegago/skillhub
