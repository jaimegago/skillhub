version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jaime-gago/skillhub

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
